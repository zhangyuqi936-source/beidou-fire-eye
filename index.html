<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#D92121">
  <meta name="description" content="北斗火眼·消防智查 — AI 驱动的消防安全智能检查工具">
  <link rel="stylesheet" href="/static/critical.css">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <title>北斗火眼·消防智查</title>
  <script>
    (function() {
      /* 主题初始化 — 避免闪烁 */
      var stored = localStorage.getItem('theme-mode') || 'auto';
      var isDark = stored === 'dark' ||
        (stored === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      /* PWA Service Worker 注册 */
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/static/sw.js', { scope: '/' })
            .catch(function() { /* 离线降级，SW 注册失败不阻塞 */ });
        });
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
