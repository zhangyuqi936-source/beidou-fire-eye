version: '3.8'
services:
  beidou-fire-eye:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
      - PE_URL=http://localhost:3100
    volumes:
      - ./data:/app/data
    restart: unless-stopped
