<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北斗火眼·消防智查 — 离线模式</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background:#F5F5F5; color:#333; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.card { background:#fff; border-radius:16px; padding:32px 24px; text-align:center; max-width:340px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.brand { font-family:"Georgia","Noto Serif SC",serif; font-size:22px; font-weight:700; color:#D92121; margin-bottom:4px; }
.sub { font-size:10px; color:#999; margin-bottom:24px; }
.icon { font-size:48px; margin-bottom:16px; }
.msg { font-size:15px; color:#666; margin-bottom:16px; line-height:1.6; }
.list { text-align:left; background:#F8F8F8; border-radius:10px; padding:16px; margin-bottom:20px; }
.item { padding:6px 0; font-size:13px; color:#666; }
.item::before { content:"✅ "; }
.btn { display:block; padding:12px; border-radius:12px; background:#D92121; color:#fff; font-size:14px; font-weight:700; text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">消防智查</div>
  <div class="sub">消防安全智能检查</div>
  <div class="icon">📡</div>
  <div class="msg">当前处于离线模式<br>部分功能暂不可用</div>
  <div class="list">
    <div class="item">浏览消防法规库</div>
    <div class="item">查看历史报告</div>
    <div class="item">快速检查清单</div>
  </div>
  <a href="/" class="btn">🔄 重新连接</a>
</div>
</body>
</html>
